

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------- CI JOBS ----------
  ci-checks:
    name: CI - Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: ./
          log_level: INFO
        continue-on-error: true
      
      - name: Check Required Files
        run: |
          echo "Checking required files..."
          [ -f index.html ] && echo "✅ index.html exists" || echo "❌ index.html missing"
          [ -f style.css ] && echo "✅ style.css exists" || echo "⚠️ style.css missing"
          [ -f script.js ] && echo "✅ script.js exists" || echo "⚠️ script.js missing"
      
      - name: Check File Sizes
        run: |
          echo "📊 File Sizes:"
          [ -f index.html ] && echo "index.html: $(du -h index.html | cut -f1)"
          [ -f style.css ] && echo "style.css: $(du -h style.css | cut -f1)"
          [ -f script.js ] && echo "script.js: $(du -h script.js | cut -f1)"

 
  deploy:
    name: CD - Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci-checks
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment Success
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Website: ${{ steps.deployment.outputs.page_url }}"