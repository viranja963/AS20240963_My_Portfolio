# ================================================================
# DEPLOYMENT WORKFLOW - GitHub Pages
# ================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ================================================================
# PERMISSIONS - Required for deployment
# ================================================================
permissions:
  contents: read
  pages: write
  id-token: write

# ================================================================
# CONCURRENCY - Prevent multiple deployments
# ================================================================
concurrency:
  group: "pages"
  cancel-in-progress: false

# ================================================================
# ENVIRONMENT - Set deployment environment
# ================================================================
env:
  DEPLOY_ENV: production

jobs:
  # ---------- BUILD JOB ----------
  build:
    name: Build Website
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: List Files
        run: |
          echo "📁 Files being deployed:"
          ls -la
  
  # ---------- DEPLOY JOB ----------
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    
    # IMPORTANT: This environment must match your Pages settings
    environment:
      name: github-pages
      url: https://viranja963.github.io/AS20240963_My_Portfolio
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment Success
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Website: https://viranja963.github.io/AS20240963_My_Portfolio"